[pytest]
testpaths = tests
pythonpath = .
python_files = test_*.py
filterwarnings =
    ignore:The 'timeout' parameter is deprecated:DeprecationWarning
    ignore:The 'verify' parameter is deprecated:DeprecationWarning
markers =
    integration: hits real MongoDB + Supabase (set RUN_DATA_INTEGRATION_TESTS=1 and env vars).
    mongo_live: real MongoDB only (RUN_MONGO_ADVISORS_TEST=1 and/or RUN_MONGO_OTHER_COLLECTIONS_TEST=1;  MONGO_URI, MONGO_DB_NAME).
                  Training payload smoke: RUN_TRAINING_PROGRESS_MONGO_TEST=1 + TRAINING_PROGRESS_TEST_USER_ID (tests/test_training_progress_live.py).
    vapi_live: real VAPI outbound call (RUN_VAPI_LIVE_CALL_TEST=1, VAPI_TEST_CUSTOMER_E164, credentials).
    scheduler: APScheduler recall/daily wiring or live pipeline (see tests/test_scheduler_integration.py).
